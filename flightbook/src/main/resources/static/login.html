<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SkyBook</title>
  <meta name="description" content="Login to your SkyBook account to manage bookings and tickets."/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo a { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .auth-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-github { background: var(--bg-card2); color: var(--text-primary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 0.6rem; width: 100%; padding: 0.7rem 1rem; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; text-decoration: none; }
    .btn-github:hover { border-color: var(--accent); }
    .password-wrap { position: relative; }
    .password-wrap .form-control { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0; }
    .toggle-pw:hover { color: var(--text-primary); }
  </style>
</head>
<body class="auth-page">

<nav class="navbar">
  <a href="/index.html" class="logo">Sky<span>Book</span></a>
  <div class="nav-links">
    <a href="/register.html">Don't have an account? <strong>Sign Up</strong></a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/index.html">SkyBook</a>
      <p>Welcome back! Log in to your account.</p>
    </div>

    <div id="login-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input class="form-control" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="password-wrap">
          <input class="form-control" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
          <button type="button" class="toggle-pw" id="toggle-pw-btn" title="Show/Hide password">👁</button>
        </div>
      </div>
      <button type="submit" id="login-btn" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
        Sign In
      </button>
    </form>

    <div class="divider">or continue with</div>

    <a href="/api/oauth2/authorization/github" class="btn-github">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.48 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
      Sign in with GitHub
    </a>

    <div class="auth-footer">
      New to SkyBook? <a href="/register.html">Create an account</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = '/flights.html';

  // Toggle password visibility
  document.getElementById('toggle-pw-btn').addEventListener('click', () => {
    const pw = document.getElementById('login-password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try {
      // Step 1: get JWT token
      const token = await apiCall('POST', '/login', { email, password }, false);
      setToken(token);

      // Step 2: fetch real user info (id, name, role) using the token
      try {
        const me = await apiCall('GET', '/me', null, true);
        setUser({ id: me.id, name: me.name, email: me.email, role: me.role });
      } catch {
        // Fallback: decode JWT sub for email at minimum
        setUser({ email, name: email });
      }

      showAlert('login-alert', 'Login successful! Redirecting…', 'success');
      setTimeout(() => window.location.href = '/flights.html', 800);
    } catch (err) {
      showAlert('login-alert', err.message || 'Invalid credentials. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SkyBook</title>
  <meta name="description" content="Create your SkyBook account to start booking flights instantly."/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .auth-page { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap  { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card  { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 460px; box-shadow: var(--shadow); }
    .auth-logo  { text-align: center; margin-bottom: 2rem; }
    .auth-logo a { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .auth-logo p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.35rem; }
    .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .password-wrap { position: relative; }
    .password-wrap .form-control { padding-right: 3rem; }
    .toggle-pw { position: absolute; right: 0.9rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0; }
    .strength-bar { height: 4px; border-radius: 4px; margin-top: 0.5rem; background: var(--bg-dark); overflow: hidden; transition: all 0.3s; }
    .strength-bar-fill { height: 100%; border-radius: 4px; width: 0; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 0.75rem; margin-top: 0.25rem; color: var(--text-muted); }
  </style>
</head>
<body class="auth-page">

<nav class="navbar">
  <a href="/index.html" class="logo">Sky<span>Book</span></a>
  <div class="nav-links">
    <a href="/login.html">Already have an account? <strong>Sign In</strong></a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="/index.html">SkyBook</a>
      <p>Create your free account in seconds.</p>
    </div>

    <div id="register-alert"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input class="form-control" type="text" id="reg-name" placeholder="John Doe" required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input class="form-control" type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <div class="password-wrap">
          <input class="form-control" type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6"/>
          <button type="button" class="toggle-pw" id="toggle-pw-btn" title="Show/Hide password">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-bar-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="form-group">
        <label for="reg-confirm">Confirm Password</label>
        <input class="form-control" type="password" id="reg-confirm" placeholder="Re-enter password" required autocomplete="new-password"/>
      </div>
      <button type="submit" id="register-btn" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = '/flights.html';

  // Toggle password visibility
  document.getElementById('toggle-pw-btn').addEventListener('click', () => {
    const pw = document.getElementById('reg-password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  // Password strength
  document.getElementById('reg-password').addEventListener('input', function () {
    const v = this.value;
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let strength = 0;
    if (v.length >= 6) strength++;
    if (v.length >= 10) strength++;
    if (/[A-Z]/.test(v)) strength++;
    if (/[0-9]/.test(v)) strength++;
    if (/[^A-Za-z0-9]/.test(v)) strength++;
    const pct = Math.min(strength * 20, 100);
    const colors = ['', '#ef4444', '#f59e0b', '#f59e0b', '#10b981', '#10b981'];
    const labels = ['', 'Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
    fill.style.width = pct + '%';
    fill.style.background = colors[strength] || '#ef4444';
    label.textContent = v.length ? labels[strength] || 'Very weak' : '';
    label.style.color = colors[strength] || 'var(--text-muted)';
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;

    if (password !== confirm) {
      showAlert('register-alert', 'Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    try {
      await apiCall('POST', '/register', { name, email, password }, false);
      showAlert('register-alert', '✓ Account created! Redirecting to login…', 'success');
      setTimeout(() => window.location.href = '/login.html', 1200);
    } catch (err) {
      showAlert('register-alert', err.message || 'Registration failed. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
